---
ansible_become: true
ansible_python_interpreter: "/usr/bin/python3"
ansible_user: "root"

systemd_journald_config:
  - section: "Journal"
    options:
      Storage: "persistent"
      MaxRetentionSec: "30d"
      SystemMaxUse: "1G"

systemd_system_config:
  - section: "Manager"
    options:
      DefaultIPAccounting: "yes"
      DefaultTimeoutStopSec: "10s"

needrestart_overrides:
  ^systemd-(udevd|networkd|resolved|logind|journald): 0
  ^postgresql: 0
  ^(mysql|mariadb): 0
  ^caddy: 0
  ^mosquitto: 0
  ^zigbee2mqtt: 0
  ^tailscaled: 0
  ^dnsmasq: 0
  ^unbound: 0
  ^stubby: 0
  ^firewalld: 0
  ^polkit: 0
  ^dbus: 0
  ^networking: 0
  ^proxmox-firewall: 0
  ^pve-(firewall|cluster|manager|storage|lxc-syscalld): 0
  ^(pvedaemon|pveproxy|pvestatd): 0
  ^(corosync|lxc|lxc-net): 0

sysctl_vars:
  - name: "net.core.rmem_max"
    value: 7500000

  - name: "net.core.wmem_max"
    value: 7500000

  - name: "vm.swappiness"
    value: 180

  - name: "vm.watermark_boost_factor"
    value: 0

  - name: "vm.watermark_scale_factor"
    value: 125

  - name: "vm.page-cluster"
    value: 0

zram_devices:
  zram0:
    zram-size: "min(ram / 2, 8192)"
    compression-algorithm: "zstd"

docker_daemon_config:
  log-driver: "journald"
  storage-driver: "overlay2"
  log-opts:
    tag: "{{ '{{.Name}}' }}"
  features:
    buildkit: true
  iptables: true
  ip6tables: true
  experimental: true
  dns-opts:
    - "ndots:5"

telegram_chat_id: "{{ _vault_telegram_chat_id }}"

notifications_apprise_urls: >-
  {{
    (_notifications_apprise_urls_smartd if _notifications_apprise_urls_smartd is defined else [])
    + (_notifications_apprise_urls_borgmatic if _notifications_apprise_urls_borgmatic is defined else [])
    + (_notifications_apprise_urls_zfs if _notifications_apprise_urls_zfs is defined else [])
    + (_notifications_apprise_urls_uk if _notifications_apprise_urls_uk is defined else [])
  }}

ssh_sshd_config:
  PasswordAuthentication: "no"
  PermitRootLogin: "prohibit-password"
