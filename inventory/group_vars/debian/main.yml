---
msmtp_host: "email-smtp.eu-north-1.amazonaws.com"
msmtp_from_addr: "{{ _vault_msmtp_from_addr }}"
msmtp_user: "{{ _vault_msmtp_user }}"
msmtp_password: "{{ _vault_msmtp_password }}"
msmtp_enabled: "{{ apt_unattended_upgrades_mail_enabled | default(false) }}"

apt_unattended_upgrades_mail_to: "{{ _vault_apt_unattended_upgrades_mail_to }}"
apt_unattended_upgrades_mail_sender: "{{ msmtp_from_addr }}"
apt_unattended_upgrades_origins:
  - "o=Debian,n=${distro_codename}-updates"
  - "o=apt.postgresql.org,n=${distro_codename}-pgdg"
  - "o=cloudsmith/caddy/stable,n=${distro_codename}"
  - "o=Proxmox,n=${distro_codename},l=Proxmox Debian Repository,c=pve-no-subscription"
  - "o=Tailscale,n=${distro_codename},l=Tailscale"

borgmatic_config_on_error:
  - "/usr/local/libexec/notifications/borgmatic-notify.py error {error}"

common_packages:
  - "bash-completion"
  - "cloud-guest-utils"
  - "ca-certificates"
  - "curl"
  - "dnsutils"
  - "ldnsutils"
  - "git"
  - "gpg"
  - "htop"
  - "jq"
  - "mtr-tiny"
  - "net-tools"
  - "psmisc"
  - "python3-apt"
  - "sudo"
  - "tcpdump"
  - "tmux"
  - "vim-nox"
