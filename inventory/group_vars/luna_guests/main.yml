---
systemd_network_files:
  - filename: "00-ens18.network"
    sections:
      - name: "Match"
        settings:
          Name: "ens18"
      - name: "Network"
        settings:
          DHCP: "yes"
      - name: "Route"
        settings:
          Destination: "100.64.0.0/10"
          Gateway: "10.10.0.1"

ansible_ssh_common_args: "-o ProxyJump={{ hostvars['luna-jumphost'].ansible_user }}@{{ hostvars['luna-jumphost'].ansible_host }}"

systemd_resolved_enabled: false

msmtp_enabled: false

