---
systemd_network_files:
  - filename: "00-ens18.network"
    sections:
      - name: "Match"
        settings:
          Name: "ens18"
      - name: "Network"
        settings:
          DHCP: "yes"
      - name: "DHCP"
        settings:
          UseDomains: "yes"
  - filename: "01-ens19.network"
    sections:
      - name: "Match"
        settings:
          Name: "ens19"
      - name: "Network"
        settings:
          DHCP: "ipv4"
      - name: "DHCP"
        settings:
          UseGateway: "false"
          UseRoutes: "false"
          UseDNS: "false"
          UseDomains: "false"

