---
- name: "borgmatic:install:packages"
  ansible.builtin.package:
    name: "{{ __borgmatic_packages[ansible_facts['os_family']] }}"
  when: "ansible_facts['os_family'] in __borgmatic_packages"
  tags: ["borgmatic"]

- name: "borgmatic:config:directories"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "{{ item.mode }}"
  loop:
    - path: "/etc/borgmatic"
      mode: "0755"
    - path: "/etc/borgmatic/secrets"
      mode: "0700"
    - path: "/etc/systemd/system/borgmatic.service.d"
      mode: "0755"
    - path: "/etc/systemd/system/borgmatic.timer.d"
      mode: "0755"
  tags: ["borgmatic"]

- name: "borgmatic:ssh-key:deploy"
  ansible.builtin.copy:
    content: "{{ borgmatic_ssh_key_contents | trim }}\n"
    dest: "/etc/borgmatic/secrets/id_ed25519"
    owner: "root"
    group: "root"
    mode: "0600"
  tags: ["borgmatic"]

- name: "borgmatic:config:deploy"
  ansible.builtin.template:
    src: "config.yaml.j2"
    dest: "/etc/borgmatic/config.yaml"
    owner: "root"
    group: "root"
    mode: "0600"
  tags: ["borgmatic"]

- name: "borgmatic:config:validate"
  ansible.builtin.command:
    cmd: "borgmatic config validate"
  changed_when: false
  tags: ["borgmatic"]

- name: "borgmatic:repo:info"
  ansible.builtin.command:
    cmd: "borgmatic repo-info --override 'retries=0' --override 'retry_wait=0'"
  register: "_borgmatic_repo_info"
  changed_when: false
  failed_when: false
  tags: ["borgmatic"]

- name: "borgmatic:repo:create"
  ansible.builtin.command:
    cmd: "borgmatic repo-create --encryption repokey-blake2"
  when: "_borgmatic_repo_info.rc != 0"
  register: "_borgmatic_repo_create"
  changed_when: true
  tags: ["borgmatic"]

- name: "borgmatic:notify:directory"
  ansible.builtin.file:
    path: "/usr/local/libexec/borgmatic"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"
  when: "borgmatic_telegram_bot_token is defined and borgmatic_telegram_chat_id is defined"
  tags: ["borgmatic"]

- name: "borgmatic:notify:script"
  ansible.builtin.template:
    src: "telegram-notify.sh"
    dest: "/usr/local/libexec/borgmatic/telegram-notify.sh"
    owner: "root"
    group: "root"
    mode: "0700"
  when: "borgmatic_telegram_bot_token is defined and borgmatic_telegram_chat_id is defined"
  tags: ["borgmatic"]

- name: "borgmatic:systemd:service:deploy"
  ansible.builtin.template:
    src: "systemd/borgmatic.service.d/00-ansible.conf.j2"
    dest: "/etc/systemd/system/borgmatic.service.d/00-ansible.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  notify: "borgmatic:systemd:daemon-reload"
  tags: ["borgmatic"]

- name: "borgmatic:systemd:timer:deploy"
  ansible.builtin.template:
    src: "systemd/borgmatic.timer.d/00-ansible.conf.j2"
    dest: "/etc/systemd/system/borgmatic.timer.d/00-ansible.conf"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "borgmatic:systemd:daemon-reload"
    - "borgmatic:timer:restart"
  tags: ["borgmatic"]

- name: "borgmatic:systemd:timer:enable"
  ansible.builtin.systemd:
    name: "borgmatic.timer"
    state: "started"
    enabled: true
    daemon_reload: true
  tags: ["borgmatic"]
