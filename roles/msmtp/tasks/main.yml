---
- name: "msmtp:packages"
  ansible.builtin.package:
    name: "{{ __msmtp_system_packages[ansible_facts['os_family']] }}"
    state: "{{ 'present' if msmtp_enabled else 'absent' }}"
  tags: ["msmtp"]

- name: "msmtp:config_dir:create"
  ansible.builtin.file:
    path: "{{ __msmtp_config_file | dirname }}"
    recurse: true
    state: "directory"
  when: "msmtp_enabled"
  tags: ["msmtp"]

- name: "msmtp:configure"
  ansible.builtin.template:
    src: "msmtp/config.j2"
    dest: "{{ __msmtp_config_file }}"
    mode: "0640"
  when: "msmtp_enabled"
  tags: ["msmtp"]

- name: "msmtp:config_dir:remove"
  ansible.builtin.file:
    path: "{{ __msmtp_config_file | dirname }}"
    state: "absent"
  when: "not msmtp_enabled"
  tags: ["msmtp"]
